        <script>
            function toggleMessage(btn) {
                const isMobile = window.matchMedia('(max-width: 37.5rem)').matches;

                if (isMobile) {
                    window.location.href = 'mailto:contact@yebinkwon.com';
                } else {
                    const msg = btn.parentElement.querySelector('#message');
                    let timeoutId;

                    if (msg.style.display === 'none') {
                        msg.style.transition = 'opacity 0.2s ease';
                        msg.style.display = 'inline';
                        setTimeout(() => {
                            msg.style.opacity = '1';
                        }, 50);



                        // Add hover listeners
                        const container = btn.parentElement.parentElement;

                        document.getElementById('emailhomelinkdiv').addEventListener('mouseleave', () => {
                            timeoutId = setTimeout(() => {
                                closeMessage(msg);
                            }, 500);
                        });

                        document.getElementById('emailhomelinkdiv').addEventListener('mouseenter', () => {
                            if (timeoutId) {
                                clearTimeout(timeoutId);
                            }
                        });


                    }
                }
            }
            function closeMessage(msg) {
                if (msg.style.display !== 'none') {
                    msg.style.opacity = '0';
                    setTimeout(() => {
                        msg.style.display = 'none';
                    }, 100);
                }
            }


        </script>
